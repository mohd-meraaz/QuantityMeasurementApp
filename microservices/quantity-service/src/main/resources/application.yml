server:
  port: 8082

spring:
  application:
    name: QUANTITY-SERVICE
  
  datasource:
    url: jdbc:mysql://localhost:3306/quantityservice
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: Meraaz@8904

  # JPA Settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Service Discovery (Eureka)
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

# Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,metrics
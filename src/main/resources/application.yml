# 1. Basic App Info
spring:
  application:
    name: Quantity Measurement App

  datasource:
    url: jdbc:h2:mem:quantitymeasurementdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope:
              - email
              - profile

# 2. Server
server:
  port: 8080

# 3. Logging
logging:
  level:
    root: INFO
    com.app.quantitymeasurement: DEBUG

# 4. Disable default security password log
spring.autoconfigure.exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# 5. Actuator & Swagger
management:
  endpoints:
    web:
      exposure:
        include: health,metrics

springdoc:
  swagger-ui:
    enabled: true

# 6. Custom App Config ( THIS IS IMPORTANT)
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://quantity-measurement-app-frontend-ruby.vercel.app}
# ===============================
# Application & Server
# ===============================
spring.application.name=quantity-measurement-app
server.port=8080

# Repository strategy (Custom property)
repository.type=database

# ===============================
# H2 & Database Configuration
# ===============================
# Spring Boot 3+ automatically detects H2Dialect; no need to specify it manually.
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Access via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===============================
# JPA & Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Fixes the "Open Session In View" warning in logs
spring.jpa.open-in-view=false

# ===============================
# Connection Pool (Hikari)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# Security (Development Only)
# ===============================
# NOTE: In production, never hardcode passwords here.
spring.security.user.name=meraaz
spring.security.user.password=051203

# ===============================
# Logging Configuration
# ===============================
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level - [%thread] %logger{36} - %msg%n

# Root Level
logging.level.root=INFO

# App specific
logging.level.com.app.quantitymeasurement=DEBUG

# Spring Framework debugging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# Hibernate/SQL debugging (Toggle to DEBUG if you need to see queries)
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.results=OFF

# ===============================
# Swagger / OpenAPI (Springdoc)
# ===============================
# Modern Springdoc v2 properties
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=true

# ===============================
# Actuator (Monitoring)
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always